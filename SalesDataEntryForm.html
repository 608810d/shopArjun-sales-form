<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Sales Data Entry - ShopArjun</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .field-group {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .field-group h3 {
            font-size: 12px;
            color: #667eea;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .field-group input {
            margin-bottom: 10px;
        }

        .field-group input:last-child {
            margin-bottom: 0;
        }

        .submit-section {
            margin-top: 30px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .status-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            font-size: 14px;
        }

        .status-box.success {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
            display: block;
        }

        .status-box.error {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
            display: block;
        }

        .status-box.info {
            background: #d1ecf1;
            border: 2px solid #17a2b8;
            color: #0c5460;
            display: block;
        }

        .status-icon {
            font-size: 20px;
            margin-right: 10px;
        }

        .verification-code {
            margin-top: 15px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            word-break: break-all;
            color: #666;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .tally-status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            background: #f0f0f0;
            border: 2px dashed #999;
        }

        .tally-status h4 {
            font-size: 12px;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 10px;
        }

        .tally-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 600;
        }

        .tally-check {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .tally-check.pending {
            background: #ffc107;
            color: white;
        }

        .tally-check.verified {
            background: #28a745;
            color: white;
        }

        .required {
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">📊 ShopArjun</div>
            <div class="subtitle">Daily Sales Data Entry Portal</div>
        </div>

        <form id="salesForm">
            <div class="two-column">
                <div class="form-group">
                    <label for="storeId">Store ID <span class="required">*</span></label>
                    <input type="text" id="storeId" name="storeId" placeholder="e.g., KC Mart # 9" required>
                </div>

                <div class="form-group">
                    <label for="month">Month <span class="required">*</span></label>
                    <select id="month" name="month" required>
                        <option value="">Select Month</option>
                        <option value="January">January</option>
                        <option value="February">February</option>
                        <option value="March">March</option>
                        <option value="April">April</option>
                        <option value="May">May</option>
                        <option value="June">June</option>
                        <option value="July">July</option>
                        <option value="August">August</option>
                        <option value="September">September</option>
                        <option value="October">October</option>
                        <option value="November">November</option>
                        <option value="December">December</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="day">Day of Month <span class="required">*</span></label>
                <input type="number" id="day" name="day" min="1" max="31" placeholder="1-31" required>
            </div>

            <div class="field-group">
                <h3>📈 Sales Data</h3>
                <label for="sixPercentSales">6% Sales</label>
                <input type="number" id="sixPercentSales" name="sixPercentSales" step="0.01" placeholder="0.00">

                <label for="nonTax">Non-Tax Sales</label>
                <input type="number" id="nonTax" name="nonTax" step="0.01" placeholder="0.00">
            </div>

            <div class="field-group">
                <h3>🎰 Department Sales</h3>
                <label for="lottery">Lottery</label>
                <input type="number" id="lottery" name="lottery" step="0.01" placeholder="0.00">

                <label for="fuel">Fuel</label>
                <input type="number" id="fuel" name="fuel" step="0.01" placeholder="0.00">

                <label for="carWash">Car Wash</label>
                <input type="number" id="carWash" name="carWash" step="0.01" placeholder="0.00">
            </div>

            <div class="field-group">
                <h3>💰 Deposits</h3>
                <label for="depInOps">Deposit in Operations</label>
                <input type="number" id="depInOps" name="depInOps" step="0.01" placeholder="0.00">

                <label for="depInLotto">Deposit in Lottery</label>
                <input type="number" id="depInLotto" name="depInLotto" step="0.01" placeholder="0.00">
            </div>

            <div class="submit-section">
                <button type="submit" id="submitBtn">Submit Daily Sales Data</button>
            </div>

            <div id="statusBox" class="status-box"></div>

            <div id="tallyStatus" class="tally-status" style="display: none;">
                <h4>📋 Data Tally Status</h4>
                <div class="tally-indicator">
                    <div class="tally-check pending" id="tallyCheck">⏳</div>
                    <span id="tallyMessage">Checking if data has been recorded...</span>
                </div>
            </div>
        </form>
    </div>

    <script>
        // Replace with your deployed Google Apps Script URL
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyDNojr2AHSwKOKGDSaQBaeIq7ylgObs1kNGIRBogB3KaF3ka64O_aj36sqzMZG1J5rfg/exec";

        const form = document.getElementById('salesForm');
        const statusBox = document.getElementById('statusBox');
        const submitBtn = document.getElementById('submitBtn');
        const tallyStatus = document.getElementById('tallyStatus');
        const tallyCheck = document.getElementById('tallyCheck');
        const tallyMessage = document.getElementById('tallyMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Clear previous status
            statusBox.className = 'status-box';
            tallyStatus.style.display = 'none';

            // Disable submit button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            // Collect form data
            const formData = {
                storeId: document.getElementById('storeId').value,
                month: document.getElementById('month').value,
                day: document.getElementById('day').value,
                sixPercentSales: parseFloat(document.getElementById('sixPercentSales').value) || null,
                nonTax: parseFloat(document.getElementById('nonTax').value) || null,
                lottery: parseFloat(document.getElementById('lottery').value) || null,
                fuel: parseFloat(document.getElementById('fuel').value) || null,
                carWash: parseFloat(document.getElementById('carWash').value) || null,
                depInOps: parseFloat(document.getElementById('depInOps').value) || null,
                depInLotto: parseFloat(document.getElementById('depInLotto').value) || null
            };

            try {
                // Submit data to Apps Script
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(formData),
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const result = await response.json();

                if (result.success) {
                    // Show success message
                    statusBox.className = 'status-box success';
                    statusBox.innerHTML = `
                        <div>
                            <span class="status-icon">✅</span>
                            <strong>Success!</strong> ${result.message}
                        </div>
                        <div class="verification-code">
                            Verification Code: ${result.verificationCode}
                        </div>
                    `;

                    // Start checking tally status
                    checkTallyStatus(formData);

                    // Reset form
                    form.reset();
                } else {
                    // Show error message
                    statusBox.className = 'status-box error';
                    statusBox.innerHTML = `
                        <span class="status-icon">❌</span>
                        <strong>Error:</strong> ${result.message}
                    `;
                }
            } catch (error) {
                statusBox.className = 'status-box error';
                statusBox.innerHTML = `
                    <span class="status-icon">❌</span>
                    <strong>Error:</strong> ${error.message}
                `;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Daily Sales Data';
            }
        });

        // Function to check if data has been tallied
        async function checkTallyStatus(formData) {
            tallyStatus.style.display = 'block';
            tallyCheck.className = 'tally-check pending';
            tallyCheck.textContent = '⏳';
            tallyMessage.textContent = 'Checking if data has been recorded...';

            // Check every 3 seconds for up to 30 seconds
            let attempts = 0;
            const maxAttempts = 10;

            const checkInterval = setInterval(async () => {
                attempts++;

                try {
                    const response = await fetch(
                        `${APPS_SCRIPT_URL}?storeId=${encodeURIComponent(formData.storeId)}&month=${encodeURIComponent(formData.month)}&day=${formData.day}`
                    );

                    const result = await response.json();

                    if (result.verified) {
                        // Data has been recorded
                        clearInterval(checkInterval);
                        tallyCheck.className = 'tally-check verified';
                        tallyCheck.textContent = '✅';
                        tallyMessage.textContent = 'Data has been successfully recorded and tallied!';
                    } else if (attempts >= maxAttempts) {
                        // Stop checking after max attempts
                        clearInterval(checkInterval);
                        tallyCheck.className = 'tally-check pending';
                        tallyCheck.textContent = '⏱';
                        tallyMessage.textContent = 'Status check complete. Data may still be processing.';
                    }
                } catch (error) {
                    if (attempts >= maxAttempts) {
                        clearInterval(checkInterval);
                        tallyCheck.textContent = '⚠';
                        tallyMessage.textContent = 'Could not verify status. Please contact support.';
                    }
                }
            }, 3000);
        }
    </script>
</body>
</html>
