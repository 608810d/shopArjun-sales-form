<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopArjun Daily Sales Entry</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .required {
            color: red;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .section {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 12px;
            color: #667eea;
            text-transform: uppercase;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .section .form-group {
            margin-bottom: 12px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            text-align: center;
            font-weight: 600;
        }

        .status-message.success {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
        }

        .status-message.error {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">📊</div>
            <div class="title">ShopArjun</div>
            <div class="subtitle">Daily Sales Entry Form</div>
        </div>

        <form id="salesForm">
            <!-- Required Fields -->
            <div class="two-column">
                <div class="form-group">
                    <label>Store ID <span class="required">*</span></label>
                    <input type="text" id="storeId" name="storeId" placeholder="e.g., KC Mart # 9" required>
                </div>

                <div class="form-group">
                    <label>Month <span class="required">*</span></label>
                    <select id="month" name="month" required>
                        <option value="">Select Month</option>
                        <option value="January">January</option>
                        <option value="February">February</option>
                        <option value="March">March</option>
                        <option value="April">April</option>
                        <option value="May">May</option>
                        <option value="June">June</option>
                        <option value="July">July</option>
                        <option value="August">August</option>
                        <option value="September">September</option>
                        <option value="October">October</option>
                        <option value="November">November</option>
                        <option value="December">December</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Date (Day 1-31) <span class="required">*</span></label>
                <input type="number" id="date" name="date" min="1" max="31" placeholder="5" required>
            </div>

            <!-- Sales Data -->
            <div class="section">
                <div class="section-title">📈 Sales Data</div>
                <div class="form-group">
                    <label>6% Sales</label>
                    <input type="number" id="sixPercentSales" name="sixPercentSales" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Non-Tax Sales</label>
                    <input type="number" id="nonTax" name="nonTax" step="0.01" placeholder="0.00">
                </div>
            </div>

            <!-- Cash Section -->
            <div class="section">
                <div class="section-title">💰 Cash & Operations</div>
                <div class="form-group">
                    <label>MO In</label>
                    <input type="number" id="moIn" name="moIn" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Cash Pay Out</label>
                    <input type="number" id="cashPayOut" name="cashPayOut" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>EBT/Card In</label>
                    <input type="number" id="ebtCardIn" name="ebtCardIn" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>ATM/Cash Out</label>
                    <input type="number" id="atmCashOut" name="atmCashOut" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Cigarette Coupon</label>
                    <input type="number" id="cigaretteCoup" name="cigaretteCoup" step="0.01" placeholder="0.00">
                </div>
            </div>

            <!-- Gas Section -->
            <div class="section">
                <div class="section-title">⛽ Gas</div>
                <div class="form-group">
                    <label>Gas Gallons</label>
                    <input type="number" id="gasGallons" name="gasGallons" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Gas Sales</label>
                    <input type="number" id="gasSales" name="gasSales" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Credit/Debit</label>
                    <input type="number" id="creditDebit" name="creditDebit" step="0.01" placeholder="0.00">
                </div>
            </div>

            <!-- Lotto Section -->
            <div class="section">
                <div class="section-title">🎰 Lottery</div>
                <div class="form-group">
                    <label>Scratch Off Sales</label>
                    <input type="number" id="scratchOff" name="scratchOff" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Online Lotto</label>
                    <input type="number" id="onlineLotto" name="onlineLotto" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Lotto Payout</label>
                    <input type="number" id="lottoPayout" name="lottoPayout" step="0.01" placeholder="0.00">
                </div>
            </div>

            <!-- Deposits Section -->
            <div class="section">
                <div class="section-title">🏦 Deposits & Other</div>
                <div class="form-group">
                    <label>House Charge</label>
                    <input type="number" id="houseCharge" name="houseCharge" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Deposit in Operations</label>
                    <input type="number" id="depInOps" name="depInOps" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Deposit in Lottery</label>
                    <input type="number" id="depInLotto" name="depInLotto" step="0.01" placeholder="0.00">
                </div>
            </div>

            <button type="submit" id="submitBtn">Submit Daily Sales</button>
            <div id="statusMessage" class="status-message"></div>
        </form>
    </div>

    <script>
        const GOOGLE_SHEET_ID = "1LX6QNImchjUqVZ8N8KEQO2iBwDYmH-I3gPFM6HBctbw";
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyDNojr2AHSwKOKGDSaQBaeIq7ylgObs1kNGIRBogB3KaF3ka64O_aj36sqzMZG1J5rfg/exec";

        const form = document.getElementById('salesForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            statusMessage.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span>Submitting...';

            const formData = {
                storeId: document.getElementById('storeId').value,
                month: document.getElementById('month').value,
                date: document.getElementById('date').value,
                sixPercentSales: parseFloat(document.getElementById('sixPercentSales').value) || null,
                nonTax: parseFloat(document.getElementById('nonTax').value) || null,
                moIn: parseFloat(document.getElementById('moIn').value) || null,
                cashPayOut: parseFloat(document.getElementById('cashPayOut').value) || null,
                ebtCardIn: parseFloat(document.getElementById('ebtCardIn').value) || null,
                atmCashOut: parseFloat(document.getElementById('atmCashOut').value) || null,
                cigaretteCoup: parseFloat(document.getElementById('cigaretteCoup').value) || null,
                gasGallons: parseFloat(document.getElementById('gasGallons').value) || null,
                gasSales: parseFloat(document.getElementById('gasSales').value) || null,
                creditDebit: parseFloat(document.getElementById('creditDebit').value) || null,
                scratchOff: parseFloat(document.getElementById('scratchOff').value) || null,
                onlineLotto: parseFloat(document.getElementById('onlineLotto').value) || null,
                lottoPayout: parseFloat(document.getElementById('lottoPayout').value) || null,
                houseCharge: parseFloat(document.getElementById('houseCharge').value) || null,
                depInOps: parseFloat(document.getElementById('depInOps').value) || null,
                depInLotto: parseFloat(document.getElementById('depInLotto').value) || null
            };

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(formData),
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                statusMessage.className = 'status-message success';
                statusMessage.innerHTML = '✅ Success! Your sales data has been submitted and recorded.';
                statusMessage.style.display = 'block';

                form.reset();

            } catch (error) {
                statusMessage.className = 'status-message error';
                statusMessage.innerHTML = '❌ Error: ' + error.message;
                statusMessage.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Submit Daily Sales';
            }
        });
    </script>
</body>
</html>
